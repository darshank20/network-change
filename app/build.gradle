plugins {
    id 'com.android.application'
}

android {
    namespace 'com.networkswitcher'
    compileSdk 34

    defaultConfig {
        applicationId "com.networkswitcher"
        minSdk 26          // Android 8 – covers 98%+ of active devices
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No external dependencies – pure Android framework only
}
